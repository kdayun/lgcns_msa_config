server:
  port: 0

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/inspire
    username: root
    password: 1234

  jpa:
    database: mysql
    database-flatform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: create
    # 콘솔출력
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 6000ms
