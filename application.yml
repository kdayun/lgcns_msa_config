server:
  port: 8080 # 0이면 랜덤 포트, K8s에서는 보통 서비스로 접근

spring:
  application:
    name: user-service

  rabbitmq:
    host: rabbitmq # K8s ClusterIP 서비스 이름
    port: 5672
    username: guest
    password: guest

  # datasource:
  #   driver-class-name: org.mariadb.jdbc.Driver
  #   url: jdbc:mariadb://mariadb-service:3306/inspire  # K8s MariaDB 서비스 이름
  #   username: ${DB_ADMIN}  # Secret에 저장된 값
  #   password: ${DB_PASSWORD}  # Secret에 저장된 값

  spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST}:3306/inspire?useSSL=true&trustServerCertificate=false
    username: ${DB_ADMIN}
    password: ${DB_PASSWORD}

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto: create
    show-sql: true

  data:
    redis:
      host: redis-service # K8s Redis 서비스 이름
      port: 6379
      password: ${REDIS_PASSWORD} # Secret에 저장된 값, 없다면 비워도 됨
      timeout: 6000ms
