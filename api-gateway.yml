server:
  port: 8888

spring:
  cloud:
    gateway:
      # eureka server 에 등록된 client를 찾아서 사용자의 url_pattern을 매핑하는 작업
      routes:
        - id: user-service
          predicates:
            - Path=/user-service/**
          filters:
            # 첫번째 접두어를 제거
            # browser: http://localhost/xxx,sbop/user-service/users/signIn
            # inner : http://localhost/users/signIns
            - StripPrefix=1
          uri: lb://user-service

        - id: product-service
          predicates:
            - Path=/product-service/**
          filters:
            - StripPrefix=1
          uri: lb://product-service

        - id: order-service
          predicates:
            - Path=/order-service/**
          filters:
            - StripPrefix=1
          uri: lb://order-service

jwt:
  secret: lgcns-inspire-spring-secret-key-for-jwt-12345678

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
